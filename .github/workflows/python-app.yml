name: Build and Package QphotoRenamer

on:
  workflow_dispatch:          # 仅支持手动触发
    inputs:
      version:
        description: ''
        required: true
        default: '2.5'
      create_release:
        description: '是否自动创建 GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set pillow-heif piexif exifread ttkbootstrap tkinterdnd2

      - name: Download and extract tkdnd
        run: |
          curl -L -o tkdnd.zip https://github.com/petasis/tkdnd/releases/download/tkdnd-release-test-v2.9.4-rc3/tkdnd-2.9.4-windows-x64.zip
          mkdir -p tkdnd
          tar -xf tkdnd.zip -C tkdnd

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --windows-console-mode=disable ^
            --enable-plugin=tk-inter ^
            --include-module=ttkbootstrap ^
            --include-package=pillow_heif ^
            --include-package=piexif ^
            --include-package=exifread ^
            --include-package=tkinterdnd2 ^
            --windows-icon-from-ico=icon.ico ^
            --product-name="QphotoRenamer" ^
            --product-version=${{ inputs.version }} ^
            --file-description="文件与照片批量重命名工具" ^
            --copyright="QwejayHuang" ^
            --output-dir=dist ^
            --clean-cache=all ^
            --assume-yes-for-downloads ^
            QphotoRenamer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QphotoRenamer-build
          path: dist/QphotoRenamer.exe

      - name: Create Release (if enabled)
        if: inputs.create_release == true
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.version }}';
            const response = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: 'QphotoRenamer v' + version,
              draft: false,
              prerelease: false,
            });
            console.log('✅ Release created: ' + response.data.html_url);
