name: Build and Package QphotoRenamer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. 检出代码库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set pillow-heif piexif exifread ttkbootstrap tkinterdnd2

      # 4. 下载并解压 tkdnd
      - name: Download and extract tkdnd
        run: |
          curl -L -o tkdnd.zip https://github.com/petasis/tkdnd/releases/download/tkdnd-release-test-v2.9.4-rc3/tkdnd-2.9.4-windows-x64.zip
          mkdir -p tkdnd
          tar -xf tkdnd.zip -C tkdnd

      # 5. 使用 Nuitka 打包（关键修复：使用 cmd shell + ^ 换行）
      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --windows-disable-console ^
            --enable-plugin=tk-inter ^
            --include-module=ttkbootstrap ^
            --include-package=pillow_heif ^
            --include-package=piexif ^
            --include-package=exifread ^
            --include-package=tkinterdnd2 ^
            --windows-icon-from-ico=icon.ico ^
            --product-name="QphotoRenamer" ^
            --product-version=2.4.0 ^
            --file-description="文件与照片批量重命名工具" ^
            --copyright="QwejayHuang" ^
            --output-dir=dist ^
            --clean-cache=all ^
            --assume-yes-for-downloads ^
            QphotoRenamer.py

      # 6. 上传构建产物作为 Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QphotoRenamer-build
          path: dist/QphotoRenamer.exe

      # 7. 获取最新 Release 版本号
      - name: Get latest release version
        id: get_version
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
            });
            let version;
            if (response.data.length === 0) {
              version = '1.0';
            } else {
              const latestTag = response.data[0].tag_name;
              const versionMatch = latestTag.match(/^v?(\d+)\.(\d+)/i);
              if (!versionMatch) {
                version = '1.0';
              } else {
                const major = parseInt(versionMatch[1], 10);
                const minor = parseInt(versionMatch[2], 10) + 1;
                version = `${major}.${minor}`;
              }
            }
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);

      # 8. 创建 GitHub Release
      - name: Create Release
        id: create_release
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = '${{ steps.get_version.outputs.version }}';
            const releaseName = 'QphotoRenamer v' + tagName;
            const response = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              draft: false,
              prerelease: false,
            });
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `upload_url=${response.data.upload_url}\n`);

      # 9. 上传构建产物到 Release
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/QphotoRenamer.exe
          asset_name: QphotoRenamer-v${{ steps.get_version.outputs.version }}.exe
          asset_content_type: application/octet-stream
