name: Build and Package QphotoRenamer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 更新到 v4

      - name: Set up Python
        uses: actions/setup-python@v5   # 更新到 v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set pillow-heif piexif exifread ttkbootstrap tkinterdnd2

      - name: Download and extract tkdnd
        run: |
          curl -L -o tkdnd.zip https://github.com/petasis/tkdnd/releases/download/tkdnd-release-test-v2.9.4-rc3/tkdnd-2.9.4-windows-x64.zip
          mkdir -p tkdnd
          tar -xf tkdnd.zip -C tkdnd

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --windows-console-mode=disable ^   # 修复警告
            --enable-plugin=tk-inter ^
            --include-module=ttkbootstrap ^
            --include-package=pillow_heif ^
            --include-package=piexif ^
            --include-package=exifread ^
            --include-package=tkinterdnd2 ^
            --windows-icon-from-ico=icon.ico ^
            --product-name="QphotoRenamer" ^
            --product-version=2.5.0 ^
            --file-description="文件与照片批量重命名工具" ^
            --copyright="QwejayHuang" ^
            --output-dir=dist ^
            --clean-cache=all ^
            --assume-yes-for-downloads ^
            QphotoRenamer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QphotoRenamer-build
          path: dist/QphotoRenamer.exe

      - name: Get latest release version
        id: get_version
        uses: actions/github-script@v7   # 更新
        with:
          script: |
            const response = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo, per_page: 1 });
            let version = '1.0';
            if (response.data.length > 0) {
              const latestTag = response.data[0].tag_name;
              const match = latestTag.match(/^v?(\d+)\.(\d+)/i);
              if (match) {
                version = `${parseInt(match[1])}.${parseInt(match[2]) + 1}`;
              }
            }
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);

      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.get_version.outputs.version }}';
            const response = await github.rest.repos.createRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              tag_name: tagName, name: 'QphotoRenamer v' + tagName,
              draft: false, prerelease: false
            });
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `upload_url=${response.data.upload_url}\n`);

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/QphotoRenamer.exe
          asset_name: QphotoRenamer-v${{ steps.get_version.outputs.version }}.exe
          asset_content_type: application/octet-stream
